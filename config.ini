[general]
output_dir = results
log_dir = logs
log_file = run.log
max_workers = 8
timeout = 60
verbose = false

[analysis]
run_binwalk = true
run_foremost = true
run_scalpel = true
run_steghide = true
run_stegseek = true
run_strings = true
run_hexdump = true
run_entropy = true
run_spectrogram = true
run_waveform = true
run_fft = true
run_ocr = true
run_qr = true
run_morse = true
run_dtmf = true
run_sstv = true
run_multimon = true
run_minimodem = true
run_metadata = true

[steghide]
wordlist = /usr/share/wordlists/rockyou.txt
passphrase =
try_empty_passphrase = true

[stegseek]
wordlist = /usr/share/wordlists/rockyou.txt

[strings]
min_length = 4

[entropy]
block_size = 256

[spectrogram]
fft_size = 2048
hop_length = 512
colormap = viridis

[flags]
patterns = flag{,FLAG{,HTB{,THM{,picoCTF{,CTF{,Hero{,Hack{,iris{,uiuctf{,corCTF{,NACTF{

[tools]
ffmpeg = ffmpeg
ffprobe = ffprobe
exiftool = exiftool
mediainfo = mediainfo
binwalk = binwalk
foremost = foremost
scalpel = scalpel
steghide = steghide
stegseek = stegseek
multimon_ng = multimon-ng
minimodem = minimodem
tesseract = tesseract
zbarimg = zbarimg
file = file
xxd = xxd
hexdump = hexdump
strings = strings
